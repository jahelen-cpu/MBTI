<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 성격유형 검사</title>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
        --bg: #F2F8F2;
        --surface: #FFFFFF;
        --green-900: #1B5E20;
        --green-700: #2E7D32;
        --green-500: #4CAF50;
        --green-100: #E8F5E9;
        --green-50: #F1F8F1;
        --border: #C8E6C9;
        --text: #1C2B1C;
        --muted: #5A705A;
        --sans: 'Apple SD Gothic Neo', 'Malgun Gothic', '맑은 고딕', sans-serif;

        --nt: #8E44AD;
        --nf: #2E9E6B;
        --sj: #2C6FBB;
        --sp: #D4A017;
    }

    body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 0 16px 64px;
        line-height: 1.6;
    }

    header {
        max-width: 860px;
        margin: 0 auto;
        padding: 40px 0 24px;
        border-bottom: 1.5px solid var(--border);
    }
    .header-eyebrow {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--green-700);
        font-weight: 700;
        margin-bottom: 8px;
    }
    header h1 { font-size: clamp(22px, 5vw, 30px); font-weight: 800; color: var(--green-900); }
    header p { font-size: 13px; color: var(--muted); margin-top: 6px; }

    main { max-width: 860px; margin: 0 auto; }

    .setup-banner {
        display: none;
        max-width: 860px;
        margin: 20px auto 0;
        background: #FFF8E1;
        border: 1.5px solid #F0C36D;
        color: #7A5B00;
        padding: 14px 18px;
        border-radius: 10px;
        font-size: 13px;
        line-height: 1.7;
    }
    .setup-banner.show { display: block; }
    .setup-banner code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px; }

    .tabs {
        display: flex;
        gap: 8px;
        margin-top: 24px;
    }
    .tab-btn {
        padding: 10px 20px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        border-radius: 9px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 700;
        color: var(--muted);
        cursor: pointer;
    }
    .tab-btn.active { background: var(--green-700); color: white; border-color: var(--green-700); }

    .panel { display: none; margin-top: 20px; }
    .panel.active { display: block; }

    .card-box {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 24px;
    }

    .field { margin-bottom: 16px; }
    .field label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 6px;
        letter-spacing: 0.03em;
    }
    .field input, .field select {
        width: 100%;
        padding: 11px 13px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        background: var(--bg);
        color: var(--text);
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--green-500); background: white; }

    .type-group { margin-bottom: 14px; }
    .type-group-title { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
    .type-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
    }
    .type-pick {
        padding: 10px 4px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        font-family: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        color: var(--text);
        transition: transform 0.1s;
    }
    .type-pick:active { transform: scale(0.96); }
    .type-pick .nick { display: block; font-size: 10px; font-weight: 600; margin-top: 3px; opacity: 0.8; }
    .type-pick.sel { color: white; border-color: transparent; }
    .type-pick.sel[data-g="NT"] { background: var(--nt); }
    .type-pick.sel[data-g="NF"] { background: var(--nf); }
    .type-pick.sel[data-g="SJ"] { background: var(--sj); }
    .type-pick.sel[data-g="SP"] { background: var(--sp); }

    .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 9px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.2s, transform 0.1s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-green { background: var(--green-700); color: white; }
    .btn-green:hover { background: var(--green-900); }
    .btn-green:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-gray { background: var(--green-50); color: var(--muted); border: 1.5px solid var(--border); }
    .btn-gray:hover { background: var(--green-100); }

    .result-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 10px;
    }
    .result-count { font-size: 13px; color: var(--muted); font-weight: 700; }
    .toolbar-actions { display: flex; gap: 8px; }

    .group-section { margin-bottom: 22px; }
    .group-title {
        font-size: 13px;
        font-weight: 800;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .group-dot { width: 9px; height: 9px; border-radius: 50%; }
    .type-cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 10px;
    }
    .type-card {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        cursor: pointer;
        transition: box-shadow 0.15s, border-color 0.15s;
    }
    .type-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); border-color: var(--green-500); }
    .type-card .code { font-size: 15px; font-weight: 800; color: var(--green-900); }
    .type-card .nick { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .type-card .count { font-size: 20px; font-weight: 800; margin-top: 8px; }

    .empty-msg { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 0; }

    .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        z-index: 200;
        align-items: center;
        justify-content: center;
        padding: 16px;
    }
    .overlay.open { display: flex; }
    .modal {
        background: var(--surface);
        border-radius: 16px;
        padding: 26px;
        width: 460px;
        max-width: 100%;
        max-height: 85vh;
        overflow-y: auto;
        box-shadow: 0 16px 48px rgba(0,0,0,0.18);
        border: 1.5px solid var(--border);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .modal-header h3 { font-size: 19px; font-weight: 800; color: var(--green-900); }
    .modal-header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); padding: 2px 6px; border-radius: 6px; }
    .modal-close:hover { background: var(--green-50); }

    .modal-desc { font-size: 13px; color: var(--text); margin-bottom: 14px; line-height: 1.7; }
    .career-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .chip { background: var(--green-100); color: var(--green-900); font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 700; }

    .student-list-title { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
    .student-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .student-list li {
        display: flex;
        gap: 10px;
        font-size: 13px;
        padding: 8px 10px;
        background: var(--bg);
        border-radius: 8px;
    }
    .student-list .sid { color: var(--muted); font-weight: 700; min-width: 56px; }

    .toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%) translateY(12px);
        background: var(--green-900);
        color: #fff;
        padding: 10px 24px;
        border-radius: 24px;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.3s, transform 0.3s;
        pointer-events: none;
        z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
    <div class="header-eyebrow">중3 학급 · MBTI 성격유형 조사</div>
    <h1>🧭 우리 반 MBTI</h1>
    <p>학번과 이름, MBTI 유형을 제출하면 반 전체 결과를 유형별로 확인할 수 있어요.</p>
</header>

<div class="setup-banner" id="setupBanner">
    ⚠️ 아직 구글시트 연동이 설정되지 않았습니다. 이 상태에서는 제출/결과 조회가 동작하지 않습니다.<br>
    <code>index.html</code> 상단의 <code>GAS_URL</code> 값을 배포된 구글 Apps Script 웹앱 URL로 교체해주세요.
</div>

<main>
    <div class="tabs">
        <button class="tab-btn active" id="tabBtnSubmit">제출하기</button>
        <button class="tab-btn" id="tabBtnResult">결과 보기</button>
    </div>

    <!-- 제출 패널 -->
    <div class="panel active" id="panelSubmit">
        <div class="card-box">
            <div class="field">
                <label>반</label>
                <select id="inputClass">
                    <option value="">반 선택</option>
                    <option value="1">1반</option>
                    <option value="2">2반</option>
                    <option value="3">3반</option>
                    <option value="4">4반</option>
                    <option value="5">5반</option>
                    <option value="6">6반</option>
                    <option value="7">7반</option>
                    <option value="8">8반</option>
                </select>
            </div>
            <div class="field">
                <label>학번</label>
                <input type="text" id="inputStudentId" placeholder="예: 15" inputmode="numeric" autocomplete="off">
            </div>
            <div class="field">
                <label>이름</label>
                <input type="text" id="inputName" placeholder="예: 홍길동" autocomplete="off">
            </div>
            <div class="field">
                <label>MBTI 유형 선택</label>
                <div id="typePicker"></div>
            </div>
            <button class="btn btn-green" id="btnSubmit" disabled>제출하기</button>
        </div>
    </div>

    <!-- 결과 패널 -->
    <div class="panel" id="panelResult">
        <div class="result-toolbar">
            <div class="result-count" id="resultCount">총 0명 제출</div>
            <div class="toolbar-actions">
                <select id="classFilter" style="padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;color:var(--text);background:var(--surface);">
                    <option value="all">전체 학급</option>
                    <option value="1">1반</option>
                    <option value="2">2반</option>
                    <option value="3">3반</option>
                    <option value="4">4반</option>
                    <option value="5">5반</option>
                    <option value="6">6반</option>
                    <option value="7">7반</option>
                    <option value="8">8반</option>
                </select>
                <button class="btn btn-gray" id="btnRefresh">↻ 새로고침</button>
                <button class="btn btn-gray" id="btnCsv">⬇ CSV 다운로드</button>
                <button class="btn btn-gray" id="btnSlides">📊 결과 슬라이드 만들기</button>
            </div>
        </div>
        <div id="resultBody"></div>
    </div>
</main>

<!-- 유형 상세 모달 -->
<div class="overlay" id="overlay">
    <div class="modal">
        <div class="modal-header">
            <div>
                <h3 id="modalTitle"></h3>
                <div class="sub" id="modalSub"></div>
            </div>
            <button class="modal-close" id="btnModalClose">✕</button>
        </div>
        <div class="modal-desc" id="modalDesc"></div>
        <div class="career-chips" id="modalCareers"></div>
        <div class="student-list-title">이 유형 학생</div>
        <ul class="student-list" id="modalStudents"></ul>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   구글시트 연동 설정
   1) 구글시트를 만들고 apps-script.gs 내용을 Apps Script에 붙여넣어 배포
   2) 배포된 웹앱 URL을 아래 GAS_URL에 붙여넣기
   ============================================================ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbynYnuaMt7zhkog8lprQCuUMu5W4KRxC3VJb7AorNiPxc_YrWWiHcTavh62dJb4SzWRPw/exec';

const MBTI_GROUPS = [
    { key: 'NT', label: '분석가', color: 'var(--nt)', types: ['INTJ', 'INTP', 'ENTJ', 'ENTP'] },
    { key: 'NF', label: '외교관', color: 'var(--nf)', types: ['INFJ', 'INFP', 'ENFJ', 'ENFP'] },
    { key: 'SJ', label: '관리자', color: 'var(--sj)', types: ['ISTJ', 'ISFJ', 'ESTJ', 'ESFJ'] },
    { key: 'SP', label: '탐험가', color: 'var(--sp)', types: ['ISTP', 'ISFP', 'ESTP', 'ESFP'] },
];

const MBTI_INFO = {
    INTJ: { nick: '전략가', desc: '독립적이고 분석적이며, 장기적인 계획을 세우고 체계적으로 목표를 달성해 나가는 것을 좋아합니다.', careers: ['분석가', '회계사', '인류학자', '파일럿', '경영 컨설턴트', '제약회사 연구원', '웹 개발자', '최고 재무 책임자'] },
    INTP: { nick: '논리술사', desc: '호기심이 많고 논리적인 사고를 즐기며, 새로운 개념과 원리를 깊이 파고드는 것을 좋아합니다.', careers: ['경제학자', '심리학자', '경찰', '프로그래머', '천문학자', '비평가', '아트디렉터', '연구원'] },
    ENTJ: { nick: '통솔자', desc: '리더십이 강하고 목표 지향적이며, 사람들을 이끌고 조직을 효율적으로 운영하는 데 능합니다.', careers: ['경영 컨설턴트', '공인중개사', '관리자', '변호사', '재무 상담사', '경제 분석가', '벤처 투자가', '판사'] },
    ENTP: { nick: '변론가', desc: '창의적이고 도전적인 아이디어를 즐기며, 토론과 새로운 시도를 통해 배우는 것을 좋아합니다.', careers: ['발명가', '벤처 사업가', '에이전트', '배우', '가수', '영화감독', '칼럼니스트', '정치인'] },
    INFJ: { nick: '옹호자', desc: '통찰력이 있고 이상주의적이며, 타인을 돕고 의미 있는 목표를 추구하는 데 관심이 많습니다.', careers: ['직업상담사', '특수교사', '노인복지사', '아트 디렉터', '프리랜서 기획자', '저널리스트', '상품기획 MD'] },
    INFP: { nick: '중재자', desc: '감성이 풍부하고 자신의 가치관을 소중히 여기며, 창의적인 방식으로 생각을 표현하는 것을 좋아합니다.', careers: ['예술가', '소설가', '시인', '음악가', '미술치료사', '사회복지사', '작곡가', '사서'] },
    ENFJ: { nick: '선도자', desc: '따뜻하고 카리스마가 있으며, 사람들을 이끌고 성장을 돕는 데서 보람을 느낍니다.', careers: ['아나운서', '리포터', '방송 MC', '언어교사', '아동복지사', 'CEO', '취업 컨설턴트', '동시통역가'] },
    ENFP: { nick: '활동가', desc: '열정적이고 사교적이며, 새로운 사람과 가능성을 탐구하는 것을 즐깁니다.', careers: ['크리에이티브 디렉터', '디자이너', '시나리오 작가', '방송 프로듀서', '홍보 컨설턴트', '상담사', '상품 기획자'] },
    ISTJ: { nick: '현실주의자', desc: '책임감이 강하고 체계적이며, 원칙과 절차를 중시하며 꾸준히 맡은 일을 해냅니다.', careers: ['통계학자', '바이어', '기상학자', '법률연구원', '보험 심사관', '형사', '감정평가사', '세관조사관'] },
    ISFJ: { nick: '수호자', desc: '헌신적이고 배려심이 많으며, 주변 사람들을 세심하게 챙기고 안정을 추구합니다.', careers: ['행정보조원', '인사관리자', '신용상담가', '보호감찰관', '물리치료사', '정신과의사', '방사선기사'] },
    ESTJ: { nick: '경영자', desc: '실용적이고 조직적이며, 규율과 효율을 중시하고 계획을 실행에 옮기는 데 능합니다.', careers: ['감독관', '예산분석가', '은행장', '정책책임자', '보안요원', '기관사', '교육전문가'] },
    ESFJ: { nick: '집정관', desc: '협조적이고 친화적이며, 공동체와 인간관계를 소중히 여기고 적극적으로 돕습니다.', careers: ['홍보책임자', '호텔지배인', '마케팅책임자', '초등학교교사', '특수교사', '비서', '유치원교사'] },
    ISTP: { nick: '장인', desc: '실용적이고 손재주가 좋으며, 조용히 관찰하다가 문제가 생기면 즉각적으로 해결합니다.', careers: ['파일럿', '카레이서', '범죄학자', '사진작가', '판매원', '운동선수', '항공기정비사', '네트워크관리자'] },
    ISFP: { nick: '모험가', desc: '온화하고 예술적 감각이 뛰어나며, 자신만의 방식으로 세상을 조용히 탐색합니다.', careers: ['보석세공사', '음향디자이너', '만화가', '지질학자', '사육사', '수의사', '법률비서', '약사'] },
    ESTP: { nick: '사업가', desc: '활동적이고 현실적이며, 순발력이 뛰어나 즉흥적인 상황에도 잘 대응합니다.', careers: ['경찰관', '소방관', '군장교', '펀드매니저', '은행원', '기자', '여행가이드', '건축엔지니어'] },
    ESFP: { nick: '연예인', desc: '활발하고 사교적이며, 주변 사람들과 즐거운 분위기를 만드는 것을 좋아합니다.', careers: ['코미디언', '의상디자이너', '일러스트레이터', '애니메이터', '여행상품기획자', '놀이치료사'] },
};

let selectedType = null;
let cachedRows = [];
let cachedRoster = [];

// ---------- 초기화 ----------
function init() {
    if (!GAS_URL || GAS_URL.indexOf('PASTE_YOUR') === 0) {
        document.getElementById('setupBanner').classList.add('show');
    }
    renderTypePicker();
    bindEvents();
}

function renderTypePicker() {
    const el = document.getElementById('typePicker');
    el.innerHTML = MBTI_GROUPS.map(g => `
        <div class="type-group">
            <div class="type-group-title">${g.label} (${g.key})</div>
            <div class="type-grid">
                ${g.types.map(t => `<button type="button" class="type-pick" data-type="${t}" data-g="${g.key}">${t}<span class="nick">${MBTI_INFO[t].nick}</span></button>`).join('')}
            </div>
        </div>
    `).join('');
}

function bindEvents() {
    document.getElementById('tabBtnSubmit').addEventListener('click', () => switchTab('submit'));
    document.getElementById('tabBtnResult').addEventListener('click', () => switchTab('result'));

    document.getElementById('typePicker').addEventListener('click', e => {
        const btn = e.target.closest('.type-pick');
        if (!btn) return;
        document.querySelectorAll('.type-pick').forEach(b => b.classList.remove('sel'));
        btn.classList.add('sel');
        selectedType = btn.dataset.type;
        validateForm();
    });

    document.getElementById('inputClass').addEventListener('change', validateForm);
    document.getElementById('inputStudentId').addEventListener('input', validateForm);
    document.getElementById('inputName').addEventListener('input', validateForm);
    document.getElementById('btnSubmit').addEventListener('click', submitEntry);

    document.getElementById('btnRefresh').addEventListener('click', loadResults);
    document.getElementById('btnCsv').addEventListener('click', downloadCsv);
    document.getElementById('btnSlides').addEventListener('click', createSlides);
    document.getElementById('classFilter').addEventListener('change', renderResults);

    document.getElementById('btnModalClose').addEventListener('click', closeModal);
    document.getElementById('overlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
    });
}

function switchTab(tab) {
    document.getElementById('tabBtnSubmit').classList.toggle('active', tab === 'submit');
    document.getElementById('tabBtnResult').classList.toggle('active', tab === 'result');
    document.getElementById('panelSubmit').classList.toggle('active', tab === 'submit');
    document.getElementById('panelResult').classList.toggle('active', tab === 'result');
    if (tab === 'result') loadResults();
}

function validateForm() {
    const classNum = document.getElementById('inputClass').value;
    const sid = document.getElementById('inputStudentId').value.trim();
    const name = document.getElementById('inputName').value.trim();
    document.getElementById('btnSubmit').disabled = !(classNum && sid && name && selectedType);
}

// ---------- 제출 ----------
async function submitEntry() {
    if (!GAS_URL || GAS_URL.indexOf('PASTE_YOUR') === 0) {
        showToast('구글시트 연동이 설정되지 않았습니다.');
        return;
    }
    const classNum = document.getElementById('inputClass').value;
    const studentId = document.getElementById('inputStudentId').value.trim();
    const name = document.getElementById('inputName').value.trim();
    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = '제출 중...';

    try {
        const res = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ classNum, studentId, name, mbti: selectedType }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || '제출 실패');

        showToast('제출되었습니다!');
        document.getElementById('inputClass').value = '';
        document.getElementById('inputStudentId').value = '';
        document.getElementById('inputName').value = '';
        document.querySelectorAll('.type-pick').forEach(b => b.classList.remove('sel'));
        selectedType = null;
    } catch (err) {
        showToast('제출 중 오류가 발생했습니다.');
    } finally {
        btn.textContent = '제출하기';
        validateForm();
    }
}

// ---------- 결과 ----------
async function loadResults() {
    const body = document.getElementById('resultBody');
    if (!GAS_URL || GAS_URL.indexOf('PASTE_YOUR') === 0) {
        body.innerHTML = '<div class="empty-msg">구글시트 연동이 설정되면 결과가 표시됩니다.</div>';
        return;
    }
    body.innerHTML = '<div class="empty-msg">불러오는 중...</div>';
    try {
        const res = await fetch(GAS_URL);
        const data = await res.json();
        if (!data.ok) throw new Error('불러오기 실패');
        cachedRows = data.rows || [];
        cachedRoster = data.roster || [];
        renderResults();
    } catch (err) {
        body.innerHTML = '<div class="empty-msg">결과를 불러오지 못했습니다. 새로고침을 눌러 다시 시도하세요.</div>';
    }
}

function getFilteredRows() {
    const filter = document.getElementById('classFilter').value;
    if (filter === 'all') return cachedRows;
    return cachedRows.filter(r => String(r.classNum) === filter);
}

function renderMissingStudents() {
    const filter = document.getElementById('classFilter').value;
    if (cachedRoster.length === 0) {
        return '<div class="empty-msg" style="padding:16px 0;">전체 학생 명단이 아직 설정되지 않았습니다. 구글시트에 \'전체명단\' 탭을 만들고 반·번호·이름을 입력하면 미제출자를 확인할 수 있어요.</div>';
    }

    const submitted = new Set(cachedRows.map(r => `${r.classNum}-${r.studentId}`));
    const roster = filter === 'all' ? cachedRoster : cachedRoster.filter(r => String(r.classNum) === filter);
    const missing = roster.filter(r => !submitted.has(`${r.classNum}-${r.studentId}`));

    if (missing.length === 0) {
        return `
            <div class="group-section">
                <div class="group-title" style="color:var(--green-700)">
                    <span class="group-dot" style="background:var(--green-700)"></span>
                    미제출 학생 없음 (전원 제출 완료)
                </div>
            </div>
        `;
    }

    return `
        <div class="group-section">
            <div class="group-title" style="color:#C0392B">
                <span class="group-dot" style="background:#C0392B"></span>
                미제출 학생 (${missing.length}명)
            </div>
            <ul class="student-list">
                ${missing
                    .sort((a, b) => String(a.classNum).localeCompare(String(b.classNum)) || String(a.studentId).localeCompare(String(b.studentId)))
                    .map(s => `<li><span class="sid">${filter === 'all' ? esc(s.classNum) + '반 ' : ''}${esc(s.studentId)}</span><span>${esc(s.name)}</span></li>`)
                    .join('')}
            </ul>
        </div>
    `;
}

function renderResults() {
    const rows = getFilteredRows();
    document.getElementById('resultCount').textContent = `총 ${rows.length}명 제출`;
    const body = document.getElementById('resultBody');

    body.innerHTML = renderMissingStudents() + MBTI_GROUPS.map(g => `
        <div class="group-section">
            <div class="group-title" style="color:${g.color}">
                <span class="group-dot" style="background:${g.color}"></span>
                ${g.label} (${g.key})
            </div>
            <div class="type-cards-grid">
                ${g.types.map(t => {
                    const count = rows.filter(r => r.mbti === t).length;
                    return `
                        <div class="type-card" onclick="openTypeModal('${t}')">
                            <div class="code">${t}</div>
                            <div class="nick">${MBTI_INFO[t].nick}</div>
                            <div class="count" style="color:${g.color}">${count}명</div>
                        </div>
                    `;
                }).join('')}
            </div>
        </div>
    `).join('');
}

function openTypeModal(type) {
    const info = MBTI_INFO[type];
    const filter = document.getElementById('classFilter').value;
    const students = getFilteredRows().filter(r => r.mbti === type);

    document.getElementById('modalTitle').textContent = `${type} · ${info.nick}`;
    document.getElementById('modalSub').textContent = `${students.length}명`;
    document.getElementById('modalDesc').textContent = info.desc;
    document.getElementById('modalCareers').innerHTML = info.careers.map(c => `<span class="chip">${esc(c)}</span>`).join('');

    const list = document.getElementById('modalStudents');
    if (students.length === 0) {
        list.innerHTML = '<li style="justify-content:center;color:var(--muted)">아직 제출한 학생이 없습니다.</li>';
    } else {
        list.innerHTML = students
            .sort((a, b) => String(a.classNum).localeCompare(String(b.classNum)) || String(a.studentId).localeCompare(String(b.studentId)))
            .map(s => `<li><span class="sid">${filter === 'all' ? esc(s.classNum) + '반 ' : ''}${esc(s.studentId)}</span><span>${esc(s.name)}</span></li>`)
            .join('');
    }

    document.getElementById('overlay').classList.add('open');
}

function closeModal() {
    document.getElementById('overlay').classList.remove('open');
}

// ---------- CSV 다운로드 ----------
function downloadCsv() {
    const rows = getFilteredRows();
    if (rows.length === 0) {
        showToast('다운로드할 데이터가 없습니다.');
        return;
    }
    const filter = document.getElementById('classFilter').value;
    const header = ['반', '학번', '이름', 'MBTI', '제출시각'];
    const lines = [header.join(',')];
    rows.forEach(r => {
        lines.push([r.classNum, r.studentId, r.name, r.mbti, r.timestamp].map(v => `"${String(v ?? '').replace(/"/g, '""')}"`).join(','));
    });
    const csv = '﻿' + lines.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filter === 'all' ? 'MBTI_결과_전체.csv' : `MBTI_결과_${filter}반.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

// ---------- 슬라이드 생성 ----------
async function createSlides() {
    if (!GAS_URL || GAS_URL.indexOf('PASTE_YOUR') === 0) {
        showToast('구글시트 연동이 설정되지 않았습니다.');
        return;
    }
    const btn = document.getElementById('btnSlides');
    const classFilter = document.getElementById('classFilter').value;
    btn.disabled = true;
    btn.textContent = '생성 중...';
    try {
        const res = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'createSlides', classFilter }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || '생성 실패');
        showToast('슬라이드가 생성되었습니다!');
        window.open(data.url, '_blank');
    } catch (err) {
        showToast('슬라이드 생성 중 오류가 발생했습니다.');
    } finally {
        btn.disabled = false;
        btn.textContent = '📊 결과 슬라이드 만들기';
    }
}

// ---------- 유틸 ----------
function esc(s) {
    return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let toastTimer = null;
function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
